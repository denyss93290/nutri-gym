<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Nutri-Gym</title>
  <style>
    body {font-family: Arial; margin:0; background:#0f172a; color:white;}
    header {padding:40px; text-align:center;}
    h1 {font-size:40px;}
    .section {padding:40px;}
    .card {
      background:white; color:black;
      padding:20px; border-radius:15px;
      margin:10px; display:inline-block; width:250px;
    }
  </style>
</head>
<body>

<header>
  <h1>Nutri-Gym</h1>
  <p>Manger sainement après le sport devient simple</p>
</header>

<div class="section">
  <h2>Nos menus</h2>

  <div class="card">
    <h3>Muscle-Up</h3>
    <p>45P / 50G / 12L</p>
    <p>≈ 490 kcal</p>
    <p>9,90€</p>
  </div>

  <div class="card">
    <h3>Bulk-Up</h3>
    <p>50P / 80G / 20L</p>
    <p>≈ 720 kcal</p>
    <p>10,90€</p>
  </div>

  <div class="card">
    <h3>Lean Fit</h3>
    <p>40P / 25G / 8L</p>
    <p>≈ 380 kcal</p>
    <p>9,90€</p>
  </div>

  <div class="card">
    <h3>Green Power</h3>
    <p>Vegan</p>
    <p>≈ 500 kcal</p>
    <p>9,90€</p>
  </div>

</div>

</body>
</html>
